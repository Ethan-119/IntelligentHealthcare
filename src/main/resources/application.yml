# 内嵌 Web 服务端口
server:
  port: 8080

spring:
  application:
    name: intelligent-healthcare
  # 管理端批量导入：Excel/CSV
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB
  # 与阿里云百炼 / DashScope 兼容（对话 + 嵌入）；密钥用环境变量 DASHSCOPE_API_KEY
  ai:
    openai:
      api-key: ${DASHSCOPE_API_KEY:}
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        options:
          model: qwen-plus
          temperature: 0.3
          max-tokens: 1024
      embedding:
        options:
          model: text-embedding-v3
          dimensions: 1024
    # MCP 服务器配置：为 ChatClient 提供图片分析等工具能力
    mcp:
      server:
        name: intelligent-healthcare-mcp
        version: 1.0.0
        type: SYNC
        sse:
          endpoint: /api/mcp/sse
          message-timeout: 60s
  # 主业务库：PostgreSQL（用户/会话/导入任务/日志等结构化数据）
  # 知识库与向量检索：MongoDB（当前口径）；历史 pgvector 配置仅保留兼容，不再作为主路径
  datasource:
    url: jdbc:postgresql://localhost:5432/intelligent_healthcare?stringtype=unspecified
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
      password: 123456
      database: 1
    # MongoDB：向量知识库存储
    mongodb:
      host: localhost
      port: 27017
      database: intelligent_healthcare
  # 表结构需 Flyway/Liquibase/手工维护；本配置不再做 JPA 自动建表
  sql:
    init:
      mode: never

# MyBatis-Plus：Mapper 在 **/infrastructure/persistence 下
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
  type-handlers-package: com.intelligenthealthcare.shared.infrastructure.mybatis

# Actuator 暴露的端点，供运维与健康检查
management:
  endpoints:
    web:
      exposure:
        include: health,info

# JWT：与 com.intelligenthealthcare.auth 模块对应；生产务必用长随机 secret（如 32+ 字节），并通过环境变量覆盖
app:
  jwt:
    secret: "change-me-dev-only-use-32-chars-minimum-key!!"
    # accessToken 在签发后的大致有效毫秒数，需与客户端刷新策略配合
    expiration-ms: 86400000
  # 与 MongoDB 向量索引维度保持一致
  rag:
    embedding-dimensions: 1024
  agent:
    react:
      max-steps: 4
      rag-top-k: 3
      debug-trace: false
  # MCP 图片视觉分析配置：使用 DashScope 多模态模型
  vision:
    enabled: true
    model: qwen-vl-plus
    max-images: 5
    analysis-timeout-ms: 30000
  cache:
    knowledge:
      # 离峰自动刷新 cron：默认每 30 分钟执行一次（00:00-02:59）
      offpeak-refresh-cron: "0 0/30 0-2 * * *"
      # 时区，保证与业务时间一致
      offpeak-refresh-zone: "Asia/Shanghai"
